name: build-standalone-binaries

env:
  RELEASE_GO_VERSION: "1.26.5"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
            executable: dist/yuxin
            goos: linux
            goarch: amd64
            smoke: ./dist/yuxin --version
          - os: ubuntu-22.04
            platform: linux-arm64
            executable: dist/yuxin
            goos: linux
            goarch: arm64
            smoke: ""
          - os: windows-latest
            platform: windows-x86_64
            executable: dist/yuxin.exe
            goos: windows
            goarch: amd64
            smoke: .\dist\yuxin.exe --version
          - os: ubuntu-22.04
            platform: windows-arm64
            executable: dist/yuxin.exe
            goos: windows
            goarch: arm64
            smoke: ""
          - os: macos-15
            platform: macos-arm64
            executable: dist/yuxin
            goos: darwin
            goarch: arm64
            smoke: ./dist/yuxin --version
          - os: macos-15-intel
            platform: macos-x86_64
            executable: dist/yuxin
            goos: darwin
            goarch: amd64
            smoke: ./dist/yuxin --version

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.RELEASE_GO_VERSION }}
          cache: false
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Prepare output directory
        run: mkdir dist
      - name: Build standalone executable
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
        run: go build -trimpath -ldflags="-s -w -buildid=" -o "${{ matrix.executable }}" ./cmd/yuxin
      - name: Smoke test
        if: matrix.smoke != ''
        run: ${{ matrix.smoke }}
      - name: Package release archive
        run: >-
          go run ./cmd/package
          --executable "${{ matrix.executable }}"
          --platform "${{ matrix.platform }}"
          --output-dir release
          --expected-tag "${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: yuxin-${{ matrix.platform }}
          path: |
            release/*.zip
            release/*.sha256
          if-no-files-found: error

  installer-shell:
    name: Shell installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Validate installer syntax
        run: sh -n scripts/install.sh
      - name: Exercise shell installer
        shell: bash
        run: |
          release_dir="$RUNNER_TEMP/yuxin-release"
          package_dir="$RUNNER_TEMP/yuxin-package"
          mkdir -p "$release_dir" "$package_dir"
          printf '#!/bin/sh\necho yuxin-installer-test\n' > "$package_dir/yuxin"
          chmod 755 "$package_dir/yuxin"
          for architecture in x86_64 arm64; do
            asset="yuxin-linux-$architecture.zip"
            install_dir="$RUNNER_TEMP/yuxin-install-$architecture"
            (cd "$package_dir" && zip -q "$release_dir/$asset" yuxin)
            (cd "$release_dir" && sha256sum "$asset" > "$asset.sha256")
            YUXIN_SYSTEM=Linux YUXIN_ARCHITECTURE="$architecture" \
              YUXIN_RELEASE_BASE="file://$release_dir" YUXIN_INSTALL_DIR="$install_dir" \
              sh scripts/install.sh
            test "$("$install_dir/yuxin")" = "yuxin-installer-test"
          done

  installer-powershell:
    name: PowerShell installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Validate installer syntax
        shell: pwsh
        run: |
          [scriptblock]::Create((Get-Content -Raw scripts/install.ps1)) | Out-Null
      - name: Exercise PowerShell installer
        shell: pwsh
        run: |
          $releaseDirectory = Join-Path $env:RUNNER_TEMP "yuxin-release"
          $packageDirectory = Join-Path $env:RUNNER_TEMP "yuxin-package"
          New-Item -ItemType Directory -Force -Path $releaseDirectory, $packageDirectory | Out-Null
          Copy-Item -LiteralPath $env:ComSpec -Destination (Join-Path $packageDirectory "yuxin.exe")
          $userPathBefore = [Environment]::GetEnvironmentVariable("Path", "User")
          foreach ($case in @(
              @{ Runtime = "X64"; Release = "x86_64" },
              @{ Runtime = "Arm64"; Release = "arm64" }
          )) {
              $asset = "yuxin-windows-$($case.Release).zip"
              $archive = Join-Path $releaseDirectory $asset
              Compress-Archive -Path (Join-Path $packageDirectory "yuxin.exe") -DestinationPath $archive
              $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
              "$hash  $asset" | Set-Content -Encoding ascii "$archive.sha256"

              $installDirectory = Join-Path $env:RUNNER_TEMP "yuxin-install-$($case.Release)"
              $env:YUXIN_ARCHITECTURE = $case.Runtime
              $env:YUXIN_RELEASE_BASE = $releaseDirectory
              $env:YUXIN_INSTALL_DIR = $installDirectory
              $env:YUXIN_SKIP_PATH = "1"
              & ./scripts/install.ps1
              $output = & (Join-Path $installDirectory "yuxin.exe") /d /c "echo yuxin-installer-test"
              if ($output.Trim() -ne "yuxin-installer-test") {
                  throw "安装后的可执行文件冒烟测试失败。"
              }
          }
          $userPathAfter = [Environment]::GetEnvironmentVariable("Path", "User")
          if ($userPathAfter -ne $userPathBefore) {
              throw "YUXIN_SKIP_PATH 未跳过用户 PATH 修改。"
          }

  homebrew-formula:
    name: Homebrew formula
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Generate and validate formula
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          formula="$RUNNER_TEMP/Formula/yuxin.rb"
          scripts/generate-homebrew-formula.sh \
            1.2.3 \
            aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb \
            "$formula"
          ruby -c "$formula"
          brew style "$formula"
          grep -q 'version "1.2.3"' "$formula"
          if scripts/generate-homebrew-formula.sh 1.2.3 invalid invalid "$formula"; then
            exit 1
          fi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, installer-shell, installer-powershell, homebrew-formula]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: yuxin-*
          path: release
          merge-multiple: true
      - name: Prepare release notes from CHANGELOG
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 == "## " version || index($0, "## " version " - ") == 1 { found = 1; next }
            found && /^## / { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          grep -q '^- ' release-notes.md

          previous_tag="$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            printf '\n[完整变更对比](https://github.com/%s/compare/%s...%s)\n' \
              "$GITHUB_REPOSITORY" "$previous_tag" "$GITHUB_REF_NAME" >> release-notes.md
          fi
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release/*
          --verify-tag
          --title "$GITHUB_REF_NAME"
          --notes-file release-notes.md

  publish-homebrew:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    concurrency:
      group: publish-homebrew
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: source
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: yuxin-*
          path: release
          merge-multiple: true
      - name: Check tap credentials
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: test -n "$HOMEBREW_TAP_TOKEN"
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: wnma3mz/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Generate formula from release checksums
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          read -r arm64_sha256 arm64_file < release/yuxin-macos-arm64.zip.sha256
          read -r x86_64_sha256 x86_64_file < release/yuxin-macos-x86_64.zip.sha256
          test "$arm64_file" = "yuxin-macos-arm64.zip"
          test "$x86_64_file" = "yuxin-macos-x86_64.zip"
          source/scripts/generate-homebrew-formula.sh \
            "$version" "$arm64_sha256" "$x86_64_sha256" tap/Formula/yuxin.rb
      - name: Push formula update
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/yuxin.rb
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "yuxin ${GITHUB_REF_NAME#v}"
          git push
