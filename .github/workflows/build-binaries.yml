name: build-standalone-binaries

env:
  RELEASE_GO_VERSION: "1.26.5"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
            executable: dist/yuxin
            smoke: ./dist/yuxin --version
          - os: windows-latest
            platform: windows-x86_64
            executable: dist/yuxin.exe
            smoke: .\dist\yuxin.exe --version
          - os: macos-15
            platform: macos-arm64
            executable: dist/yuxin
            smoke: ./dist/yuxin --version
          - os: macos-15-intel
            platform: macos-x86_64
            executable: dist/yuxin
            smoke: ./dist/yuxin --version

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.RELEASE_GO_VERSION }}
          cache: false
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Prepare output directory
        run: mkdir dist
      - name: Build standalone executable
        run: go build -trimpath -ldflags="-s -w -buildid=" -o "${{ matrix.executable }}" ./cmd/yuxin
      - name: Smoke test
        run: ${{ matrix.smoke }}
      - name: Package release archive
        run: >-
          go run ./cmd/package
          --executable "${{ matrix.executable }}"
          --platform "${{ matrix.platform }}"
          --output-dir release
          --expected-tag "${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: yuxin-${{ matrix.platform }}
          path: |
            release/*.zip
            release/*.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: yuxin-*
          path: release
          merge-multiple: true
      - name: Prepare release notes from CHANGELOG
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 == "## " version || index($0, "## " version " - ") == 1 { found = 1; next }
            found && /^## / { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          grep -q '^- ' release-notes.md

          previous_tag="$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            printf '\n[完整变更对比](https://github.com/%s/compare/%s...%s)\n' \
              "$GITHUB_REPOSITORY" "$previous_tag" "$GITHUB_REF_NAME" >> release-notes.md
          fi
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release/*
          --verify-tag
          --title "$GITHUB_REF_NAME"
          --notes-file release-notes.md
