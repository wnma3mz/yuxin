name: build-standalone-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
            executable: dist/yuxin
            smoke: ./dist/yuxin --version
          - os: windows-latest
            platform: windows-x86_64
            executable: dist/yuxin.exe
            smoke: .\dist\yuxin.exe --version
          - os: macos-15
            platform: macos-arm64
            executable: dist/yuxin
            smoke: ./dist/yuxin --version
          - os: macos-15-intel
            platform: macos-x86_64
            executable: dist/yuxin
            smoke: ./dist/yuxin --version

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Prepare output directory
        run: mkdir dist
      - name: Build standalone executable
        run: go build -trimpath -ldflags="-s -w -buildid=" -o "${{ matrix.executable }}" ./cmd/yuxin
      - name: Smoke test
        run: ${{ matrix.smoke }}
      - name: Package release archive
        run: >-
          go run ./cmd/package
          --executable "${{ matrix.executable }}"
          --platform "${{ matrix.platform }}"
          --output-dir release
          --expected-tag "${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}"
      - name: Validate macOS launcher
        if: runner.os == 'macOS'
        shell: bash
        run: |
          unzip -q release/*.zip -d launcher-check
          root="$(find launcher-check -mindepth 1 -maxdepth 1 -type d -print -quit)"
          launcher="$root/Open-Yuxin.app/Contents/MacOS/Open-Yuxin"
          plutil -lint "$root/Open-Yuxin.app/Contents/Info.plist"
          sh -n "$launcher"
          # shellcheck disable=SC2016
          printf '#!/bin/sh\nprintf "%%s" "$*" > "$YUXIN_LAUNCHER_PROBE"\n' > "$root/yuxin"
          chmod 755 "$root/yuxin"
          YUXIN_LAUNCHER_PROBE="$RUNNER_TEMP/launcher-args" "$launcher"
          test "$(cat "$RUNNER_TEMP/launcher-args")" = "web"
      - name: Validate Linux launcher
        if: runner.os == 'Linux'
        shell: bash
        run: |
          unzip -q release/*.zip -d launcher-check
          root="$(find launcher-check -mindepth 1 -maxdepth 1 -type d -print -quit)"
          desktop="$root/Open-Yuxin.desktop"
          test -x "$desktop"
          sudo apt-get update
          sudo apt-get install --yes desktop-file-utils libglib2.0-bin
          desktop-file-validate "$desktop"
          # shellcheck disable=SC2016
          printf '#!/bin/sh\nprintf "%%s" "$*" > "$YUXIN_LAUNCHER_PROBE"\n' > "$root/yuxin"
          chmod 755 "$root/yuxin"
          YUXIN_LAUNCHER_PROBE="$RUNNER_TEMP/launcher-args" gio launch "$desktop"
          for _ in $(seq 1 50); do
            test -f "$RUNNER_TEMP/launcher-args" && break
            sleep 0.1
          done
          test "$(cat "$RUNNER_TEMP/launcher-args")" = "web"
      - name: Validate Windows launcher
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Expand-Archive -Path (Get-ChildItem release/*.zip).FullName -DestinationPath launcher-check
          $root = (Get-ChildItem launcher-check -Directory | Select-Object -First 1).FullName
          $probeSource = Join-Path $env:RUNNER_TEMP "launcher-probe.go"
          @'
          package main
          import ("os"; "strings")
          func main() { _ = os.WriteFile(os.Getenv("YUXIN_LAUNCHER_PROBE"), []byte(strings.Join(os.Args[1:], " ")), 0644) }
          '@ | Set-Content -Encoding utf8 $probeSource
          go build -o (Join-Path $root "yuxin.exe") $probeSource
          $env:YUXIN_LAUNCHER_PROBE = Join-Path $env:RUNNER_TEMP "launcher-args"
          cscript.exe //nologo (Join-Path $root "Open-Yuxin.vbs")
          for ($attempt = 0; $attempt -lt 50 -and -not (Test-Path $env:YUXIN_LAUNCHER_PROBE); $attempt++) {
              Start-Sleep -Milliseconds 100
          }
          if ((Get-Content -Raw $env:YUXIN_LAUNCHER_PROBE) -ne "web") {
              throw "Windows launcher did not invoke yuxin.exe web."
          }
      - uses: actions/upload-artifact@v7
        with:
          name: yuxin-${{ matrix.platform }}
          path: |
            release/*.zip
            release/*.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: yuxin-*
          path: release
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes
