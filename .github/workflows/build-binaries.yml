name: build-standalone-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
            executable: dist/yuxin
            smoke: ./dist/yuxin --version
          - os: windows-latest
            platform: windows-x86_64
            executable: dist/yuxin.exe
            smoke: .\dist\yuxin.exe --version
          - os: macos-15
            platform: macos-arm64
            executable: dist/yuxin
            smoke: ./dist/yuxin --version
          - os: macos-15-intel
            platform: macos-x86_64
            executable: dist/yuxin
            smoke: ./dist/yuxin --version

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: false
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Prepare output directory
        run: mkdir dist
      - name: Build standalone executable
        run: go build -trimpath -ldflags="-s -w -buildid=" -o "${{ matrix.executable }}" ./cmd/yuxin
      - name: Smoke test
        run: ${{ matrix.smoke }}
      - name: Package release archive
        run: >-
          go run ./cmd/package
          --executable "${{ matrix.executable }}"
          --platform "${{ matrix.platform }}"
          --output-dir release
          --expected-tag "${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}"
      - uses: actions/upload-artifact@v7
        with:
          name: yuxin-${{ matrix.platform }}
          path: |
            release/*.zip
            release/*.sha256
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: yuxin-*
          path: release
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes
