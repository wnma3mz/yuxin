name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  database:
    name: Supabase SQL contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: yuxin_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d yuxin_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGDATABASE: yuxin_test
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Create Supabase public roles
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          create role anon noinherit nologin;
          create role authenticated noinherit nologin;
          SQL
      - name: Apply migrations
        shell: bash
        run: |
          for migration in web/supabase/migrations/*.sql; do
            psql -v ON_ERROR_STOP=1 -f "$migration"
          done
      - name: Verify privacy contract
        run: psql -v ON_ERROR_STOP=1 -f web/supabase/tests/privacy.sql

  web:
    name: Web test and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run audit

  go:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.22.x
          cache: false
      - name: Format
        shell: bash
        run: test -z "$(gofmt -l .)"
      - name: Test with coverage
        run: go test ./... -coverprofile=coverage.out
      - name: Coverage
        shell: bash
        run: |
          go tool cover -func=coverage.out
          coverage="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')"
          awk -v coverage="$coverage" 'BEGIN {if (coverage + 0 < 78) exit 1}'
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build -trimpath -ldflags="-s -w -buildid=" -o yuxin ./cmd/yuxin
      - name: Smoke test
        run: ./yuxin --version

  workflow-lint:
    name: Workflow and shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          cache: false
      - name: ShellCheck
        run: shellcheck scripts/*.sh
      - name: actionlint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
