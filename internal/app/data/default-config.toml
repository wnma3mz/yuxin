# 余薪 Yuxin 默认配置
version = 1
refresh_interval = 1
# 退休和资产默认关闭；运行 `yuxin config` 可按需开启。
retirement_years = 0
retirement_start_date = "2026-07-16"
progress_birth_date = "1995-01-01"
reserve = "0"
assets_enabled = false
profile_enabled = false

[salary]
# monthly（月薪）/ daily（日薪）/ hourly（时薪）
mode = "monthly"
amount = "8000"
monthly_workdays = "22"

[schedule]
# 1=周一，7=周日
workdays = [1, 2, 3, 4, 5]
start = "09:00"
end = "18:00"
lunch_enabled = true
lunch_start = "12:00"
lunch_end = "13:00"
