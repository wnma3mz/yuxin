# 余薪 Yuxin 默认配置
version = 1
refresh_interval = 1
slogan = "摸鱼有数，下班有期。"
# 退休和存款默认关闭；运行 `yuxin config` 可按需开启。
# 下列日期仅用于兼容旧配置，模块关闭时不参与展示或计算。
retirement_years = 0
retirement_start_date = "2026-07-17"
progress_birth_date = "1995-01-01"
retirement_mode = "full"
retirement_unit = "days"
reserve = "0"
target_monthly_spend = "0"
balance_start_date = "2026-07-17"
assets_enabled = false
profile_enabled = false

[salary]
# monthly（月薪）/ daily（日薪）/ hourly（时薪）
mode = "monthly"
amount = "8000"
monthly_workdays = "22"

[schedule]
# 1=周一，7=周日
workdays = [1, 2, 3, 4, 5]
start = "09:00"
end = "18:00"
lunch_enabled = true
lunch_start = "12:00"
lunch_end = "13:00"

[privacy]
hide_amounts = false
hide_retirement_date = false
